<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMQrCode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .qrcode-container {
            display: none;
            margin-top: 40px;
        }

        .qrcode-container.active {
            display: block;
        }

        .qrcode-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .qrcode-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s;
        }

        .qrcode-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .qrcode-item h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .qrcode-wrapper {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .platform-info {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            word-break: break-all;
            text-align: left;
        }

        .platform-info strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .download-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #5568d3;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .qrcode-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📱 二维码生成器</h1>

        <div class="input-group">
            <label for="urlInput">请输入 URL 地址：</label>
            <input type="text" id="urlInput" placeholder="例如: https://www.example.com" />
        </div>

        <button onclick="generateQRCodes()">生成二维码</button>

        <div class="qrcode-container" id="qrcodeContainer">
            <div class="qrcode-grid">
                <div class="qrcode-item">
                    <h3>🍎 iOS</h3>
                    <div class="qrcode-wrapper">
                        <div id="qrcode-ios"></div>
                    </div>
                    <button class="download-btn" onclick="downloadQRCode('qrcode-ios', 'iOS-QRCode')">下载二维码</button>
                    <div class="platform-info">
                        <strong>深链接:</strong>
                        <span id="ios-url"></span>
                    </div>
                </div>

                <div class="qrcode-item">
                    <h3>🤖 Android</h3>
                    <div class="qrcode-wrapper">
                        <div id="qrcode-android"></div>
                    </div>
                    <button class="download-btn"
                        onclick="downloadQRCode('qrcode-android', 'Android-QRCode')">下载二维码</button>
                    <div class="platform-info">
                        <strong>深链接:</strong>
                        <span id="android-url"></span>
                    </div>
                </div>

                <div class="qrcode-item">
                    <h3>🦋 鸿蒙</h3>
                    <div class="qrcode-wrapper">
                        <div id="qrcode-harmonyos"></div>
                    </div>
                    <button class="download-btn"
                        onclick="downloadQRCode('qrcode-harmonyos', 'HarmonyOS-QRCode')">下载二维码</button>
                    <div class="platform-info">
                        <strong>深链接:</strong>
                        <span id="harmonyos-url"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
<script>
    function generateQRCodes() {
        const urlInput = document.getElementById('urlInput').value.trim();

        if (!urlInput) {
            alert('请输入有效的 URL 地址！');
            return;
        }

        // 清除之前的二维码
        document.getElementById('qrcode-ios').innerHTML = '';
        document.getElementById('qrcode-android').innerHTML = '';
        document.getElementById('qrcode-harmonyos').innerHTML = '';

        // 生成深链接
        const iosUrl = `eastmoney://wireless/h5/nonavweb?url=${encodeURIComponent(urlInput)}&emthemenavmode=1`;
        const androidUrl = `dfcft://webh5?titlebartype=trans&url=${encodeURIComponent(urlInput)}`;
        const harmonyosUrl = `emoh://entry/WebPage?url=${encodeURIComponent(urlInput)}&setBottomMargin=true&customUserAgent=true&navMode=1`;

        // 显示深链接
        document.getElementById('ios-url').textContent = iosUrl;
        document.getElementById('android-url').textContent = androidUrl;
        document.getElementById('harmonyos-url').textContent = harmonyosUrl;

        // 生成 iOS 二维码
        new QRCode(document.getElementById('qrcode-ios'), {
            text: iosUrl,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // 生成 Android 二维码
        new QRCode(document.getElementById('qrcode-android'), {
            text: androidUrl,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // 生成鸿蒙二维码
        new QRCode(document.getElementById('qrcode-harmonyos'), {
            text: harmonyosUrl,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // 显示二维码容器
        document.getElementById('qrcodeContainer').classList.add('active');
    }

    function downloadQRCode(qrcodeId, filename) {
        const qrcodeElement = document.getElementById(qrcodeId);
        const canvas = qrcodeElement.querySelector('canvas');

        if (!canvas) {
            alert('请先生成二维码！');
            return;
        }

        // 将 canvas 转换为图片并下载
        const link = document.createElement('a');
        link.download = `${filename}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // 回车键触发生成
    document.getElementById('urlInput').addEventListener('keypress', function (event) {
        if (event.key === 'Enter') {
            generateQRCodes();
        }
    });
</script>

</html>
