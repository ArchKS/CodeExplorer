        // 正态分布
        function norm(x) {
            const t = 1 / (1 + 0.2316419 * Math.abs(x));
            const d = 0.3989423 * Math.exp(-x * x / 2);
            const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
            return x >= 0 ? 1 - p : p;
        }

        function resolveDaysInput(value) {
            const text = String(value ?? '').trim();
            if (!text) return 0;

            // 纯数字，按天数处理
            if (/^\d+(\.\d+)?$/.test(text)) {
                return Math.max(0, Math.ceil(parseFloat(text)));
            }

            // 否则按日期处理
            const targetDate = parseDateInput(text);
            if (!targetDate) return NaN;

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const end = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());

            const diffMs = end - today;
            const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

            return Math.max(0, diffDays);
        }

        // BS模型计算
        function bs(S, K, T, r, s, type) {
            const sqT = Math.sqrt(T);
            const d1 = (Math.log(S / K) + (r + 0.5 * s * s) * T) / (s * sqT);
            const d2 = d1 - s * sqT;
            const nd1 = norm(d1), nd2 = norm(d2);
            const ndm1 = norm(-d1), ndm2 = norm(-d2);
            const pdf = Math.exp(-d1 * d1 / 2) / Math.sqrt(2 * Math.PI);

            let price, delta, rho;
            if (type === 'call') {
                price = S * nd1 - K * Math.exp(-r * T) * nd2;
                delta = nd1; rho = K * T * Math.exp(-r * T) * nd2 / 100;
            } else {
                price = K * Math.exp(-r * T) * ndm2 - S * ndm1;
                delta = -ndm1; rho = -K * T * Math.exp(-r * T) * ndm2 / 100;
            }

            const gamma = pdf / (S * s * sqT);
            const theta = (-S * s * pdf / (2 * sqT) - r * K * Math.exp(-r * T) * (type === 'call' ? nd2 : ndm2)) / 365;
            const vega = S * sqT * pdf / 100;
            return { price, delta, gamma, theta, vega, rho };
        }

        function getTodayStart() {
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate());
        }

        function parseDateInput(value) {
            if (value == null) return null;

            const text = String(value).trim();
            if (!text) return null;

            const normalized = text.replace(/[./]/g, '-');
            const m = normalized.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
            if (!m) return null;

            const year = +m[1];
            const month = +m[2];
            const day = +m[3];

            const dt = new Date(year, month - 1, day);
            if (
                dt.getFullYear() !== year ||
                dt.getMonth() !== month - 1 ||
                dt.getDate() !== day
            ) {
                return null;
            }

            return dt;
        }

        function formatDate(dt) {
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, '0');
            const d = String(dt.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
        }

        function addDays(baseDate, days) {
            const dt = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
            dt.setDate(dt.getDate() + Math.round(Number(days || 0)));
            return dt;
        }

        function calcDaysBetween(today, targetDate) {
            const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const end = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
            const diffMs = end - start;
            return Math.max(0, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
        }

        function setHint(text, isError = false) {
            const hint = document.getElementById('daysHint');
            if (!hint) return;

            hint.className = `text-xs mt-2 min-h-[20px] ${isError ? 'text-red-600' : 'text-gray-500'}`;
        }

        // days -> expiryDate
        function syncFromDays() {
            const daysEl = document.getElementById('days');
            const dateEl = document.getElementById('expiryDate');
            if (!daysEl || !dateEl) return false;

            const raw = String(daysEl.value || '').trim();
            if (!raw) {
                dateEl.value = '';
                setHint('支持输入 2026.06.05 / 2026-06-05 / 2026/06/05');
                return false;
            }

            if (!/^\d+(\.\d+)?$/.test(raw)) {
                setHint('到期天数格式不正确', true);
                return false;
            }

            const days = Math.max(0, Math.ceil(parseFloat(raw)));
            const expiryDate = addDays(getTodayStart(), days);
            dateEl.value = formatDate(expiryDate);
            setHint(`对应到期日期：${dateEl.value}`);
            return true;
        }

        // expiryDate -> days
        function syncFromDate() {
            const daysEl = document.getElementById('days');
            const dateEl = document.getElementById('expiryDate');
            if (!daysEl || !dateEl) return false;

            const raw = String(dateEl.value || '').trim();
            if (!raw) {
                daysEl.value = '';
                setHint('支持输入 2026.06.05 / 2026-06-05 / 2026/06/05');
                return false;
            }

            const dt = parseDateInput(raw);
            if (!dt) {
                setHint('到期日期格式不正确，请输入例如：2026.06.05', true);
                return false;
            }

            const days = calcDaysBetween(getTodayStart(), dt);
            daysEl.value = days;
            setHint(`对应到期天数：${days} 天`);
            return true;
        }

        function getResolvedDays() {
            const rawDays = String(document.getElementById('days')?.value || '').trim();
            const rawDate = String(document.getElementById('expiryDate')?.value || '').trim();

            if (rawDays && /^\d+(\.\d+)?$/.test(rawDays)) {
                return Math.max(0, Math.ceil(parseFloat(rawDays)));
            }

            if (rawDate) {
                const dt = parseDateInput(rawDate);
                if (!dt) return NaN;
                return calcDaysBetween(getTodayStart(), dt);
            }

            return 0;
        }

        // 生成数据
        function generateData(S, K, daysTotal, r, s, type) {
            const labels = [], values = [], pctChanges = [];
            for (let d = daysTotal; d >= 0; d--) {
                const T = d / 365;
                const val = bs(S, K, T, r / 100, s / 100, type).price;
                labels.push(d + '天');
                values.push(val);
            }

            // 计算环比
            for (let i = 0; i < values.length; i++) {
                if (i === 0) { pctChanges.push(0); continue; }
                const prev = values[i - 1];
                const curr = values[i];
                if (prev === 0) { pctChanges.push(0); continue; }
                const pct = (curr - prev) / prev * 100;
                pctChanges.push(pct);
            }
            return { labels, values, pctChanges };
        }

        const areaBetweenLineAndXAxisPlugin = {
            id: 'areaBetweenLineAndXAxisPlugin',
            beforeDatasetsDraw(chart) {
                const { ctx, chartArea, scales } = chart;
                if (!chartArea || !scales.x || !scales.y) return;

                const meta = chart.getDatasetMeta(0);
                const points = meta.data;
                const data = chart.data.datasets[0].data;

                if (!points || points.length < 2) return;

                // x轴对应的像素位置。这里是 y=0
                const baseY = scales.y.getPixelForValue(0);

                ctx.save();

                for (let i = 0; i < points.length - 1; i++) {
                    const p1 = points[i];
                    const p2 = points[i + 1];

                    const x1 = p1.x;
                    const y1 = p1.y;
                    const x2 = p2.x;
                    const y2 = p2.y;

                    // 这一段的颜色规则
                    // 你可以按 data[i]、data[i+1]、或者两者平均值来判断
                    const v = data[i + 1];

                    ctx.beginPath();
                    ctx.moveTo(x1, baseY);   // 从x轴起点开始
                    ctx.lineTo(x1, y1);      // 到曲线第一个点
                    ctx.lineTo(x2, y2);      // 到曲线第二个点
                    ctx.lineTo(x2, baseY);   // 回到x轴终点
                    ctx.closePath();

                    ctx.fillStyle = v < -5
                        ? 'rgba(220,38,38,0.20)'
                        : 'rgba(5,150,105,0.10)';

                    ctx.fill();
                }

                ctx.restore();
            }
        };

        const FLAG_TARGET = -5;

        // 计算曲线首次与 target 相交的位置
        function findCrossingInfo(labels, data, target = -5) {
            if (!data || data.length < 2) return null;

            for (let i = 0; i < data.length - 1; i++) {
                const y1 = data[i];
                const y2 = data[i + 1];

                // 正好命中某个点
                if (y1 === target) {
                    return {
                        hitType: 'point',
                        index: i,
                        daysFromStart: i,
                        label: labels[i],
                        value: y1
                    };
                }

                // 判断这一段是否穿过 target
                const crossed =
                    (y1 - target) * (y2 - target) < 0 ||
                    y2 === target;

                if (crossed) {
                    const t = (target - y1) / (y2 - y1); // 0~1
                    const daysFromStart = i + t;

                    return {
                        hitType: 'segment',
                        index: i,
                        nextIndex: i + 1,
                        t,
                        daysFromStart,
                        value: target,
                        leftLabel: labels[i],
                        rightLabel: labels[i + 1]
                    };
                }
            }

            return null;
        }

        function getStartDateFromExpiryAndDays(expiryDateText, totalDays) {
            const expiry = parseDateInput(expiryDateText);
            if (!expiry || !Number.isFinite(totalDays)) return null;

            const start = new Date(expiry.getFullYear(), expiry.getMonth(), expiry.getDate());
            start.setDate(start.getDate() - Math.round(totalDays));
            return start;
        }

        function drawPctChart(labels, data) {
            try {
                const ctx = document.getElementById('pctChart').getContext('2d');
                if (pctChart) pctChart.destroy();

                const crossingInfo = findCrossingInfo(labels, data, FLAG_TARGET);

                const areaBetweenLineAndXAxisPlugin = {
                    id: 'areaBetweenLineAndXAxisPlugin',
                    beforeDatasetsDraw(chart) {
                        const { ctx, chartArea, scales } = chart;
                        if (!chartArea || !scales.x || !scales.y) return;

                        const meta = chart.getDatasetMeta(0);
                        const points = meta.data;
                        const values = chart.data.datasets[0].data;

                        if (!points || points.length < 2) return;

                        const baseY = scales.y.getPixelForValue(0);

                        ctx.save();

                        for (let i = 0; i < points.length - 1; i++) {
                            const p1 = points[i];
                            const p2 = points[i + 1];

                            const x1 = p1.x;
                            const y1 = p1.y;
                            const x2 = p2.x;
                            const y2 = p2.y;

                            const v = values[i + 1];

                            ctx.beginPath();
                            ctx.moveTo(x1, baseY);
                            ctx.lineTo(x1, y1);
                            ctx.lineTo(x2, y2);
                            ctx.lineTo(x2, baseY);
                            ctx.closePath();

                            ctx.fillStyle = v < -5
                                ? 'rgba(220,38,38,0.20)'
                                : 'rgba(5,150,105,0.10)';

                            ctx.fill();
                        }

                        ctx.restore();
                    }
                };

                const flagPlugin = {
                    id: 'flagPlugin',
                    afterDatasetsDraw(chart) {
                        if (!crossingInfo) return;

                        const { ctx, scales, chartArea } = chart;
                        const meta = chart.getDatasetMeta(0);
                        const points = meta.data;
                        if (!points || !points.length) return;

                        const flagY = scales.y.getPixelForValue(FLAG_TARGET);

                        let flagX = null;

                        if (crossingInfo.hitType === 'point') {
                            flagX = points[crossingInfo.index]?.x ?? null;
                        } else if (crossingInfo.hitType === 'segment') {
                            const p1 = points[crossingInfo.index];
                            const p2 = points[crossingInfo.nextIndex];
                            if (!p1 || !p2) return;
                            flagX = p1.x + (p2.x - p1.x) * crossingInfo.t;
                        }

                        flagX -=12;

                        console.log({flagX});
                        if (flagX == null) return;

                        const totalDays = getResolvedDays();
                        const expiryDateText = document.getElementById('expiryDate')?.value?.trim() || '';
                        const startDate = getStartDateFromExpiryAndDays(expiryDateText, totalDays);

                        let daysText = `距起点 ${crossingInfo.daysFromStart.toFixed(1)} 天`;

                        if (startDate) {
                            const hitDate = addDays(startDate, crossingInfo.daysFromStart);
                            daysText = `距起点 ${crossingInfo.daysFromStart.toFixed(1)} 天（${formatDate(hitDate)}）`;
                        }

                        // const totalDays = parseFloat(labels[0]);
                        // const remainDays = totalDays - crossingInfo.daysFromStart;
                        // const daysText = `剩余 ${remainDays.toFixed(1)} 天`;

                        const valueText = `-5%`;
                        const poleTopY = Math.max(chartArea.top + 100, flagY - 58);
                        const poleBottomY = flagY;

                        ctx.save();

                        // 1) 画水平参考虚线
                        ctx.beginPath();
                        ctx.setLineDash([6, 4]);
                        ctx.strokeStyle = 'rgba(245, 80, 0, 0.65)';
                        ctx.lineWidth = 1;
                        ctx.moveTo(chartArea.left, flagY);
                        ctx.lineTo(chartArea.right, flagY);
                        ctx.stroke();

                        // 2) 画旗杆
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.strokeStyle = '#f55000';
                        ctx.lineWidth = 2;
                        ctx.moveTo(flagX, poleBottomY);
                        ctx.lineTo(flagX, poleTopY);
                        ctx.stroke();

                        // 3) 画旗面
                        const flagW = 52;
                        const flagH = 22;
                        const flagTip = 10;

                        ctx.beginPath();
                        ctx.moveTo(flagX, poleTopY);
                        ctx.lineTo(flagX + flagW, poleTopY);
                        ctx.lineTo(flagX + flagW - flagTip, poleTopY + flagH / 2);
                        ctx.lineTo(flagX + flagW, poleTopY + flagH);
                        ctx.lineTo(flagX, poleTopY + flagH);
                        ctx.closePath();
                        ctx.fillStyle = '#f55000';
                        ctx.fill();

                        // 4) 旗面文字
                        ctx.fillStyle = '#fff';
                        ctx.font = '12px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(valueText, flagX + 24, poleTopY + flagH / 2);

                        // 5) 交点圆点
                        ctx.beginPath();
                        ctx.arc(flagX, flagY, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#f55000';
                        ctx.fill();

                        // 6) 天数说明
                        ctx.font = '12px sans-serif';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'bottom';
                        ctx.fillStyle = '#374151';

                        let textX = flagX + 8;
                        if (textX > chartArea.right - 90) {
                            textX = flagX - 90;
                        }

                        ctx.fillText(daysText, textX, poleTopY - 6);

                        ctx.restore();
                    }
                };

                pctChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: '环比变化幅度(以-5%为界)',
                            data,
                            borderColor: 'blue',
                            borderWidth: 3,
                            pointRadius: 0,
                            tension: 0.2,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                callbacks: {
                                    afterBody: function (items) {
                                        if (!items.length) return '';

                                        const idx = items[0].dataIndex;
                                        const v = data[idx];

                                        if (v === FLAG_TARGET) {
                                            return `命中 -5%，距起点 ${idx.toFixed(1)} 天`;
                                        }

                                        return '';
                                    }
                                }
                            },
                            legend: {
                                display: true
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: '#eee' }
                            },
                            y: {
                                grid: { color: '#eee' },
                                ticks: {
                                    stepSize: 5
                                }
                            }
                        }
                    },
                    plugins: [areaBetweenLineAndXAxisPlugin, flagPlugin]
                });
            } catch (e) {
                console.error(e);
            }
        }


        // 渲染表格
        function renderTable(labels, values, pctChanges) {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = '';
            for (let i = 0; i < labels.length; i++) {
                const tr = document.createElement('tr');
                let changeText = '-';
                let color = 'text-gray-600';
                if (i > 0) {
                    changeText = pctChanges[i].toFixed(2) + '%';
                    color = pctChanges[i] >= 0 ? 'text-green-600' : 'text-red-600';
                }
                tr.innerHTML = `
                <td class="px-4 py-2.5">${labels[i]}</td>
                <td class="px-4 py-2.5 font-medium">${values[i].toFixed(4)}</td>
                <td class="px-4 py-2.5 font-medium ${color}">${changeText}</td>
            `;
                tb.appendChild(tr);
            }
        }

        // 主计算
        function calc() {
            const S = +document.getElementById('stockPrice').value || 0;
            const K = +document.getElementById('strikePrice').value || 0;
            const days = getResolvedDays();
            const r = +document.getElementById('rate').value || 0;
            const s = +document.getElementById('vol').value || 0;

            if (S <= 0 || K <= 0 || !Number.isFinite(days) || days <= 0 || s <= 0) return;

            const res = bs(S, K, days / 365, r / 100, s / 100, type);
            document.getElementById('price').textContent = res.price.toFixed(4);
            document.getElementById('delta').textContent = res.delta.toFixed(4);
            document.getElementById('gamma').textContent = res.gamma.toFixed(6);
            document.getElementById('theta').textContent = res.theta.toFixed(6);
            document.getElementById('vega').textContent = res.vega.toFixed(4);
            document.getElementById('rho').textContent = res.rho.toFixed(4);

            const { labels, values, pctChanges } = generateData(S, K, days, r, s, type);
            drawValueChart(labels, values);
            drawPctChart(labels, pctChanges);
            renderTable(labels, values, pctChanges);
        }

        window.addEventListener('load', () => {
            calc();
        });
